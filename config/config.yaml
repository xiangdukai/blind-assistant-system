# 盲人辅助系统配置文件

# 相机配置
camera:
  type: "stereo"  # stereo（USB双目摄像头） / realsense / webcam
  camera_index: 0  # 摄像头设备编号
  resolution:
    width: 640
    height: 480
  fps: 30
  depth_enabled: true

  # 相机内参（左相机，来自出厂标定）
  intrinsics:
    fx: 416.841180253704
    fy: 416.465934495134
    cx: 338.485167779639
    cy: 230.419201769346

# YOLO模型配置
yolo:
  model_path: "models/yolov8n.pt"
  confidence_threshold: 0.5
  iou_threshold: 0.45
  device: "cpu"  # cpu / cuda

# 动态危险预测
danger_detection:
  enabled: true
  safe_distance: 2.0  # 安全距离(米)
  prediction_time: 3.0  # 预测时间(秒)
  danger_levels:
    high: 1.5  # 高危险碰撞时间阈值(秒)
    medium: 3.0  # 中危险碰撞时间阈值(秒)

  # 相机内参（左目，来自出厂标定）
  camera_matrix:
    fx: 416.841180253704
    fy: 416.465934495134
    cx: 338.485167779639
    cy: 230.419201769346

# 目标跟踪配置（3D空间跟踪 + 卡尔曼滤波）
tracker:
  type: "deepsort"  # 基于3D空间的DeepSORT实现
  max_age: 30  # 最大未匹配帧数
  min_hits: 3  # 最小匹配次数（确认轨迹）
  distance_threshold: 1.0  # 3D空间距离阈值(米)，用于匈牙利算法匹配

  # 相机内参（左目，来自出厂标定）
  camera_matrix:
    fx: 416.841180253704
    fy: 416.465934495134
    cx: 338.485167779639
    cy: 230.419201769346

# 楼梯检测
stair_detection:
  enabled: true
  canny_threshold1: 50
  canny_threshold2: 150
  hough_threshold: 100
  min_line_length: 50
  max_line_gap: 10

# 斑马线检测
crosswalk_detection:
  enabled: true
  model_path: "models/crosswalk.pt"

# 文字识别
ocr:
  enabled: true
  language: "ch"  # ch / en
  use_angle_cls: true
  det_model: "ch_PP-OCRv4_det"
  rec_model: "ch_PP-OCRv4_rec"

# AI辅助感知（多模态大语言模型，非紧急场景每60帧调用一次）
ai_assistant:
  enabled: true
  api_url: "https://api.wkcloud.com.cn/v1/chat/completions"
  api_key: "sk-zokjJ30OdSyjdPaSW524a9MKkaHPBiOG2GKbIrBle8lxlb4I"
  model: "gpt-4.1-mini"
  max_tokens: 80
  timeout: 15
  jpeg_quality: 60
  prompt: "你是盲人出行辅助系统的视觉感知模块。用不超过25个汉字的一句话描述图中对盲人行走最关键的信息。优先关注：障碍物（位置和距离）、台阶坡道、人群车辆、地面状况、路口标志。只输出描述，不加任何前缀。"

# 衣物检索
clothing_search:
  enabled: true
  use_llm: true  # 使用大模型API
  llm_api_key: ""  # API密钥
  llm_base_url: ""  # API地址

# 盲道检测
blind_path_detection:
  enabled: true
  model_type: "pidnet"  # pidnet
  model_path: "models/pidnet_s_cityscapes.pth"

# 导航
navigation:
  enabled: true
  gps_enabled: false
  map_api: "amap"  # amap / baidu / google
  api_key: ""

# 语音反馈
voice:
  enabled: true
  engine: "pyttsx3"  # pyttsx3 / openai
  language: "zh-CN"
  rate: 150  # 语速
  volume: 1.0  # 音量

# 震动反馈
vibration:
  enabled: true
  connection_type: "bluetooth"  # bluetooth / serial
  port: ""  # 串口端口
  intensity_levels:
    low: 100
    medium: 200
    high: 255

# 日志配置
logging:
  level: "INFO"  # DEBUG / INFO / WARNING / ERROR
  file_path: "logs/system.log"
  console_output: true

# 测试模式
test_mode:
  enabled: false
  use_test_images: false
  test_images_path: "tests/test_images/"
  save_results: true
  results_path: "tests/results/"
